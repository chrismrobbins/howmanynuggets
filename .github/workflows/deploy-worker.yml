name: Deploy Worker

# Auto-deploys the Cloudflare Worker (worker/) whenever its code changes on main.
# Also runnable on demand from the Actions tab (or `gh workflow run "Deploy Worker"`).
on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy howmanynuggets-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Best-effort: keep the remote D1 schema current. Idempotent
      # (CREATE TABLE IF NOT EXISTS). continue-on-error so a token without D1
      # permission can never block the Worker deploy.
      - name: Apply D1 schema
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: d1 execute howmanynuggets --remote --file=./schema.sql -y

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
