name = "howmanynuggets-api"
main = "src/index.js"
compatibility_date = "2026-01-01"
# We serve only on the api.howmanynuggets.com custom domain, never workers.dev.
workers_dev = false

# D1 database binding. Create the DB with:
#   wrangler d1 create howmanynuggets
# then paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "howmanynuggets"
database_id = "2cd74807-a091-45a0-8713-002abc552607"

# Serve the API at api.howmanynuggets.com. wrangler provisions the DNS record
# and TLS cert on first deploy. This matches the frontend's default API base,
# and the frontend origin (howmanynuggets.com) is already allow-listed for CORS
# in src/index.js. Requires the howmanynuggets.com zone on this Cloudflare account.
[[routes]]
pattern = "api.howmanynuggets.com"
custom_domain = true

# Multiplayer framework: one GameRoom Durable Object per game room. Games plug in
# as modules (worker/src/games/*). SQLite-backed so it runs on the free plan.
[[durable_objects.bindings]]
name = "GAME_ROOMS"
class_name = "GameRoom"

[[migrations]]
tag = "v2"
new_sqlite_classes = ["GameRoom"]
